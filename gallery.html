<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эксперимент с Bootstrap</title>
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
        crossorigin="anonymous">
        <link rel="stylesheet" href="custom.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4">Моё портфолио</h2>
        <div class="text-center mb-4">
            <div class="btn-group" role="group">
                <button class="btn btn-outline-primary" onclick="filterGallery('all')">Все</button>
                <button class="btn btn-outline-primary" onclick="filterGallery('web')">Веб-дизайн</button>
                <button class="btn btn-outline-primary" onclick="filterGallery('photo')">Фотография</button>
                <button class="btn btn-outline-primary" onclick="filterGallery('graphic')">Графика</button>
            </div>
        </div>
        <div class="row g-3" id="gallery">
            <div class="col-6 col-md-4 gallery-item" data-category="web">
                <div class="card h-100">
                    <img src="https://avatars.mds.yandex.net/i?id=cef730b6181e877e78a475e98988da31ba104f31df7d2c63-6160767-images-thumbs&n=13" class="card-img-top" alt="Веб-проект">
                    <div class="card-body p-2">
                        <h6 class="card-title mb-0">Корпоративный сайт</h6>
                        <small class="text-muted">Веб-дизайн</small>
                    </div>
                </div>
            </div>            
            <div class="col-6 col-md-4 gallery-item" data-category="web">
                <div class="card h-100">
                    <img src="https://avatars.mds.yandex.net/i?id=bba061432b146ea6708d586088ac4a27b887fc23-16914344-images-thumbs&n=13" class="card-img-top" alt="Веб">
                    <div class="card-body p-2">
                        <h6 class="card-title mb-0">Веб</h6>
                        <small class="text-muted">Веб-дизайн</small>
                    </div>
                </div>
            </div>           
            <div class="col-6 col-md-4 gallery-item" data-category="photo">
                <div class="card h-100">
                    <img src="https://avatars.mds.yandex.net/i?id=5d6d80e7b9543c34bb5d0fc095687b39d5b22d2b-5226442-images-thumbs&n=13" class="card-img-top" alt="Фото">
                    <div class="card-body p-2">
                        <h6 class="card-title mb-0">Фото пустыни</h6>
                        <small class="text-muted">Фото</small>
                    </div>
                </div>
            </div>            
            <div class="col-6 col-md-4 gallery-item" data-category="photo">
                <div class="card h-100">
                    <img src="https://avatars.mds.yandex.net/i?id=effeeb3510e7cafb4fe9481afcca141becf5f535-10639889-images-thumbs&n=13" class="card-img-top" alt="Фото">
                    <div class="card-body p-2">
                        <h6 class="card-title mb-0">Фото леса</h6>
                        <small class="text-muted">Фото</small>
                    </div>
                </div>
            </div>   
            <div class="col-6 col-md-4 gallery-item" data-category="graphic">
                <div class="card h-100">
                    <img src="https://avatars.mds.yandex.net/i?id=8b7584463e1a3ef2172690bf9af964ea96e4d186-5869061-images-thumbs&n=13" class="card-img-top" alt="Рисунок">
                    <div class="card-body p-2">
                        <h6 class="card-title mb-0">Рисунок утки</h6>
                        <small class="text-muted">Графика</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4 gallery-item" data-category="graphic">
                <div class="card h-100">
                    <img src="https://avatars.mds.yandex.net/i?id=f90c905160da371a10308cefea185a3bca8fc667-8331156-images-thumbs&n=13" class="card-img-top" alt="Рисунок">
                    <div class="card-body p-2">
                        <h6 class="card-title mb-0">Рисунок кота</h6>
                        <small class="text-muted">Графика</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script>
    function filterGallery(category) {
        const items = document.querySelectorAll(".gallery-item");
        const buttons = document.querySelectorAll(".btn-group .btn");
        buttons.forEach((btn) => {
            btn.classList.remove("active");
        });
        event.target.classList.add("active");
        items.forEach((item) => {
            const itemCategory = item.dataset.category;
            if (category === "all" || category === itemCategory) {
                item.style.display = "block";
            } else {
                item.style.display = "none";
            }
        });
    }
    window.onload = function () {
        document.querySelector(".btn-group .btn").classList.add("active");
    };
</script>
</html>
